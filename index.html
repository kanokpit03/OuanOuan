<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Login</title>

<style>
body{
    font-family: Arial;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.login-box{
    width:320px;
    padding:30px;
    background:#1f2937;
    border-radius:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff5ca8;
    color:white;
    font-size:16px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Our Memories ❤️</h2>

<input id="username" placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="error"></p>

</div>

<script>

function login(){

let pass=document.getElementById("password").value;

if(pass=="143"){

window.location.href="welcome.html";

}

else{

document.getElementById("error").innerHTML="Wrong password ❤️";

}

}

</script>

</body>
</html>
